<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BMC Menu Banner</title>
  <meta name="description" content="Reusable Balcony Music Club menu banner component.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./site-nav.css?v=20260615">
  <style>
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,rgba(226,58,191,.20),transparent 30%),radial-gradient(circle at top right,rgba(255,210,91,.14),transparent 28%),linear-gradient(180deg,#10071e 0%,#05020c 100%);color:#fff3cf;font-family:system-ui,sans-serif}.demo-wrap{width:min(1050px,calc(100vw - 36px));margin:0 auto;padding:32px 0 64px}.demo-card{padding:24px;border:1px solid rgba(255,210,91,.25);background:rgba(10,3,25,.62);box-shadow:0 20px 60px rgba(0,0,0,.35)}.demo-card h1{margin:0 0 10px;color:#ffd25b}.demo-card p{margin:0;line-height:1.6;color:rgba(255,243,207,.86)}
  </style>
</head>
<body>
<header class="site-header" aria-label="Balcony Music Club site header">
  <a class="brand" href="https://www.balconymusicclub.com/" aria-label="Balcony Music Club home">
    <img src="https://floydclaptonblues.github.io/BMC-Homepage/bmc_homepage_build/assets/bmc-logo-pixel.png?v=logo-revert-jazzycat-room-20260615" alt="Balcony Music Club">
  </a>

  <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">☰</button>

  <nav class="main-nav" aria-label="Primary navigation">
    <a href="https://www.balconymusicclub.com/">Home</a>
    <a href="https://shows.balconymusicclub.com/">Shows</a>
    <a href="https://www.balconymusicclub.com/host-your-event">Host Your Event</a>
    <a href="https://www.balconymusicclub.com/store">Store</a>
    <a href="https://www.balconymusicclub.com/ask-jazzycat">Ask JazzyCat</a>
  </nav>

  <div class="header-actions header-socials" aria-label="Balcony Music Club social links">
    <a class="social-btn" href="https://www.instagram.com/balconymusicclub" target="_blank" rel="noopener noreferrer" aria-label="Instagram" title="Instagram">IG</a>
    <a class="social-btn" href="https://www.youtube.com/@BalconyMusicClub" target="_blank" rel="noopener noreferrer" aria-label="YouTube" title="YouTube">YT</a>
    <a class="social-btn" href="https://www.facebook.com/balconymusicclub" target="_blank" rel="noopener noreferrer" aria-label="Facebook" title="Facebook">FB</a>
    <a class="social-btn social-btn--app" href="https://app.balconymusicclub.com/" target="_blank" rel="noopener noreferrer" aria-label="BMC App" title="BMC App">APP</a>
  </div>
</header>

  <main class="demo-wrap">
    <section class="demo-card">
      <h1>BMC Menu Banner Component</h1>
      <p>This repo hosts the reusable Balcony Music Club menu banner for HTML source embeds.</p>
    </section>
  </main>

  <script src="./site-nav.js?v=20260615" defer></script>
</body>
</html>
