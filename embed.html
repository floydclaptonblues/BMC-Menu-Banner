<!-- BMC Menu Banner iframe embed -->
<div class="bmc-menu-banner-embed" style="width:100%;max-width:100%;margin:0;padding:0;overflow:hidden;line-height:0;">
  <iframe
    id="bmcMenuBannerFrame"
    title="Balcony Music Club menu banner"
    src="https://floydclaptonblues.github.io/BMC-Menu-Banner/frame.html?v=20260615-frame"
    loading="eager"
    scrolling="no"
    allowtransparency="true"
    style="display:block;width:100%;height:150px;max-width:100%;margin:0;padding:0;border:0;background:transparent;overflow:hidden;"
  ></iframe>
</div>

<script>
(function () {
  const frame = document.getElementById("bmcMenuBannerFrame");
  if (!frame) return;

  window.addEventListener("message", function (event) {
    if (event.origin !== "https://floydclaptonblues.github.io") return;
    const data = event.data || {};
    if (data.type !== "bmc-menu-banner-height") return;

    const nextHeight = Math.max(80, Math.min(520, Number(data.height) || 150));
    frame.style.height = nextHeight + "px";
  });
})();
</script>
<!-- /BMC Menu Banner iframe embed -->
